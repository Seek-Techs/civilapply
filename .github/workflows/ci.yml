name: Deploy Check

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask requests beautifulsoup4 reportlab pdfplumber

      - name: Syntax check web.py
        run: python -m py_compile web.py && echo "✓ web.py syntax OK"

      - name: Check static/app.js exists
        run: test -f static/app.js && echo "✓ app.js found"

      - name: Check requirements.txt
        run: test -f requirements.txt && echo "✓ requirements.txt found"
